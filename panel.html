<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar OS — Admin</title>
  <style>
    :root {
      --bg:        #0A0A10;
      --surface:   #14141C;
      --surface2:  #1E1E2A;
      --surface3:  #252534;
      --border:    #2A2A3C;
      --accent:    #7C5CFC;
      --accent2:   #C084FC;
      --danger:    #E05252;
      --success:   #4ADE80;
      --warn:      #F1C40F;
      --text:      #EEEEF8;
      --text-muted:#7878A0;
      --radius:    8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar-sep { flex: 1; }
    .tab-bar { display: flex; gap: 2px; }
    .tab {
      padding: 6px 16px;
      border-radius: var(--radius);
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all .15s;
    }
    .tab:hover { color: var(--text); background: var(--surface2); }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .topbar-actions { display: flex; gap: 8px; }

    /* ── Layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar izquierdo (capas / keywords) ── */
    #sidebar-left {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-left-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    #sidebar-left-content::-webkit-scrollbar { width: 4px; }
    #sidebar-left-content::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Centro ── */
    #center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    #center-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    #center-content::-webkit-scrollbar { width: 4px; }
    #center-content::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Sidebar derecho (preview) ── */
    #sidebar-right {
      width: 320px;
      min-width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #preview-area {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      overflow-y: auto;
    }
    #preview-canvas-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: #111;
    }
    #preview-canvas {
      width: 100%;
      display: block;
    }
    .preview-controls { display: flex; gap: 8px; }

    /* ── Layer toggles en preview ── */
    .layer-toggle-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 240px;
      overflow-y: auto;
    }
    .layer-toggle-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
    .layer-toggle-item:hover { background: var(--surface2); }

    /* ── Shared components ── */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .panel-title em { font-style: normal; color: var(--text); }

    .btn-sm {
      padding: 5px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn-sm:hover { opacity: .8; }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-danger-sm { background: var(--danger); border-color: var(--danger); color: #fff; }

    .btn-icon {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 13px;
      transition: color .15s, background .15s;
    }
    .btn-icon:hover { color: var(--text); background: var(--surface2); }
    .btn-danger { color: var(--danger) !important; }
    .btn-danger:hover { background: rgba(224,82,82,.15) !important; }

    /* ── Layer list ── */
    .layer-list { display: flex; flex-direction: column; gap: 4px; }
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius);
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .layer-item:hover { border-color: var(--accent); }
    .layer-item.selected { border-color: var(--accent); background: rgba(124,92,252,.1); }
    .layer-item.locked { opacity: .65; }
    .layer-item.dragging { opacity: .4; }
    .layer-item.drag-over { border-color: var(--accent2); background: rgba(192,132,252,.1); }

    .drag-handle { color: var(--text-muted); cursor: grab; font-size: 16px; }
    .drag-handle.disabled { cursor: not-allowed; opacity: .3; }
    .layer-order {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      width: 18px;
      text-align: center;
    }
    .layer-info { flex: 1; min-width: 0; }
    .layer-item-name { font-size: 12px; font-weight: 600; display: block; }
    .layer-item-meta { font-size: 10px; color: var(--text-muted); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .layer-badges { display: flex; gap: 4px; }

    /* ── Badges ── */
    .badge {
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 4px;
      font-weight: 700;
    }
    .badge-lock { background: rgba(241,196,15,.15); color: var(--warn); }
    .badge-opt  { background: var(--surface3); color: var(--text-muted); }
    .badge-kw   { background: rgba(241,196,15,.15); color: var(--warn); }

    /* ── Asset admin grid ── */
    .asset-admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .asset-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .15s;
    }
    .asset-card:hover { border-color: var(--accent); }
    .asset-card-preview {
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0E0E16;
    }
    .asset-card-info {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .asset-card-name { font-size: 11px; font-weight: 600; }
    .asset-card-id   { font-size: 10px; color: var(--text-muted); }
    .asset-card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 2px;
      padding: 4px 6px;
      border-top: 1px solid var(--border);
    }

    /* ── Dropzone ── */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      font-size: 12px;
    }
    .dropzone:hover, .dropzone.active { border-color: var(--accent); background: rgba(124,92,252,.05); color: var(--text); }
    .upload-label { cursor: pointer; }

    /* ── Color tokens panel ── */
    .token-admin-list { display: flex; flex-direction: column; gap: 12px; }
    .token-admin-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .token-admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .token-admin-name { font-size: 12px; font-weight: 700; }
    .token-type-badge { font-size: 10px; background: var(--surface3); padding: 2px 7px; border-radius: 4px; color: var(--text-muted); }
    .token-palette { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .token-swatch-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }
    .token-swatch {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
    }
    .token-swatch:hover { border-color: #fff; }
    .token-swatch-label { font-size: 9px; color: var(--text-muted); }
    .token-bindings { font-size: 11px; color: var(--text-muted); }

    /* ── Keyword table ── */
    .kw-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .kw-table th {
      text-align: left;
      padding: 8px 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    .kw-table td {
      padding: 10px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .kw-table tr:last-child td { border-bottom: none; }
    .kw-table code {
      background: var(--surface3);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 1px;
    }
    .text-muted { color: var(--text-muted); }

    /* ── Toggle switch ── */
    .toggle { position: relative; display: inline-block; width: 34px; height: 18px; }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--surface3);
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: transform .2s, background .2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle input:checked + .toggle-track::after { transform: translateX(16px); background: #fff; }

    /* ── Modal / wizard ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 560px;
      max-width: 96vw;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 15px; font-weight: 700; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }
    .wizard-form, .wizard-section { padding: 16px 20px; }
    .wizard-section { border-top: 1px solid var(--border); }
    .wizard-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }
    .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .form-row label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
    .form-row input, .form-row select, .form-row textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 13px;
    }
    .form-row input:focus, .form-row select:focus { outline: 1px solid var(--accent); }
    .form-row input:disabled { opacity: .5; cursor: not-allowed; }
    .asset-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .asset-row select { flex: 0 0 140px; }
    .asset-row .row-src { flex: 1; }
    .asset-row input, .asset-row select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 6px 8px;
      color: var(--text);
      font-size: 12px;
    }

    /* ── Layer edit modal ── */
    .layer-modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; padding: 16px 20px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      z-index: 999;
      animation: fadeIn .2s ease;
    }
    .toast-error   { background: #2D1010; border: 1px solid var(--danger); color: var(--danger); }
    .toast-success { background: #0D2010; border: 1px solid var(--success); color: var(--success); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Save indicator ── */
    #save-status {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 4px;
      transition: all .3s;
    }
    #save-status.saved   { color: var(--success); }
    #save-status.unsaved { color: var(--warn); font-weight: 700; }
    #btn-save-manual {
      display: none;
      padding: 6px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--success);
      background: rgba(74,222,128,.15);
      color: var(--success);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: background .15s;
    }
    #btn-save-manual:hover { background: rgba(74,222,128,.3); }
    #btn-save-manual.visible { display: block; }
  </style>
</head>
<body>

<!-- ── Topbar ── -->
<div class="topbar">
  <h1>AVATAR OS · ADMIN</h1>
  <div class="tab-bar">
    <button class="tab active" data-tab="layers">Capas</button>
    <button class="tab" data-tab="tokens">Colores</button>
    <button class="tab" data-tab="keywords">Keywords</button>
    <button class="tab" data-tab="batch">📦 Lote</button>
  </div>
  <div class="topbar-sep"></div>
  <span id="save-status"></span>
  <button id="btn-save-manual">💾 Guardar cambios</button>
  <div class="topbar-actions">
    <button class="btn-sm" id="btn-reset-config" title="Eliminar cambios guardados y recargar desde layer-config.json">↺ Resetear</button>
    <button class="btn-sm" id="btn-export-config">↓ Exportar config</button>
    <label class="btn-sm upload-label">↑ Importar config
      <input type="file" id="import-config-input" accept=".json" style="display:none">
    </label>
    <a href="index.html" class="btn-sm" target="_blank">↗ Ver Builder</a>
  </div>
</div>

<!-- ── Workspace ── -->
<div class="workspace">

  <!-- Sidebar izquierdo -->
  <div id="sidebar-left">
    <div id="sidebar-left-content"></div>
  </div>

  <!-- Panel central -->
  <div id="center-panel">
    <div id="center-content"></div>
  </div>

  <!-- Sidebar derecho — preview -->
  <div id="sidebar-right">
    <div id="preview-area">
      <div class="panel-header" style="padding:0">
        <span class="panel-title">Preview en vivo</span>
        <button class="btn-sm" id="btn-test-random">🎲 Test aleatorio</button>
      </div>
      <div id="preview-canvas-wrap">
        <canvas id="preview-canvas" width="1000" height="1000"></canvas>
      </div>
      <div class="preview-controls">
        <button class="btn-sm" style="flex:1" id="btn-preview-export">Exportar PNG</button>
      </div>
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);margin-top:4px">Capas visibles</div>
      <div class="layer-toggle-list" id="layer-toggle-list"></div>
    </div>
  </div>

</div>

<!-- Scripts -->
<script src="js/asset-scaler.js"></script>
<script src="js/svg-processor.js"></script>
<script src="js/variant-engine.js"></script>
<script src="js/batch-uploader.js"></script>
<script src="js/color-engine.js"></script>
<script src="js/state.js"></script>
<script src="js/engine.js"></script>
<script src="js/layer-manager.js"></script>
<script src="js/asset-manager.js"></script>
<script src="js/keyword-engine.js"></script>
<script src="admin-modules/layer-panel.js"></script>
<script src="admin-modules/asset-panel.js?v=2"></script>
<script src="admin-modules/keyword-panel.js"></script>
<script src="admin-modules/preview-panel.js?v=2"></script>

<script>
// ── Admin App ─────────────────────────────────────────────────────────────

let _layers = [];
let _tokens = {};
let _kwConfig = {};
let _activeTab = 'layers';
let _dirty = false;

const sidebarLeft   = document.getElementById('sidebar-left-content');
const centerContent = document.getElementById('center-content');
const previewCanvas = document.getElementById('preview-canvas');

const ADMIN_STORAGE_KEY = 'avatar-os-admin-layers-v1';

function _saveLayers() {
  try {
    // Strip any dataURL srcs before saving (too large for localStorage)
    const toSave = _layers.map(layer => ({
      ...layer,
      assets: layer.assets.map(a => ({
        ...a,
        src: (a.src && a.src.startsWith('data:')) ? `assets/${layer.id}/${a.id}.svg` : a.src
      }))
    }));
    localStorage.setItem(ADMIN_STORAGE_KEY, JSON.stringify(toSave));
    const el = document.getElementById('save-status');
    el.textContent = '✓ Guardado';
    el.className = 'saved';
    document.getElementById('btn-save-manual').classList.remove('visible');
    _dirty = false;
  } catch(e) {
    console.warn('[Admin] No se pudo guardar en localStorage', e);
    const el = document.getElementById('save-status');
    el.textContent = '✗ Error al guardar';
    el.className = 'unsaved';
  }
}

function _loadSavedLayers() {
  try {
    const raw = localStorage.getItem(ADMIN_STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

// ── Init ──
async function init() {
  const [layersData, tokensData, kwData] = await Promise.all([
    fetch('data/layer-config.json').then(r => r.json()),
    fetch('data/color-tokens.json').then(r => r.json()),
    fetch('data/keyword-config.json').then(r => r.json()),
  ]);

  // Restore from localStorage if available, otherwise use JSON
  const saved = _loadSavedLayers();
  _layers = (saved || layersData.layers).sort((a,b) => a.order - b.order);
  _tokens = tokensData;
  _kwConfig = kwData;

  PreviewPanel.init(previewCanvas, _layers, _flatTokens());
  buildLayerToggles();
  switchTab('layers');

  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => switchTab(tab.dataset.tab);
  });

  document.getElementById('btn-test-random').onclick = () => PreviewPanel.randomize();
  document.getElementById('btn-preview-export').onclick = exportPreviewPNG;
  document.getElementById('btn-export-config').onclick = () => AssetManager.exportLayerConfig(_layers);
  document.getElementById('btn-save-manual').onclick = () => _saveLayers();
  document.getElementById('btn-reset-config').onclick = () => {
    if (!confirm('¿Resetear configuración? Se perderán los cambios guardados localmente.')) return;
    localStorage.removeItem(ADMIN_STORAGE_KEY);
    location.reload();
  };
  document.getElementById('import-config-input').onchange = async e => {
    try {
      const data = await AssetManager.importLayerConfig(e.target.files[0]);
      _layers = data.layers.sort((a,b) => a.order - b.order);
      refreshAll();
      showToast('Configuración importada', 'success');
    } catch(err) {
      showToast(err.message, 'error');
    }
  };
}

function _flatTokens() {
  const out = {};
  const list = _tokens.tokens || Object.entries(_tokens).map(([id, def]) => ({ id, ...def }));
  list.forEach(def => {
    out[def.id] = def.default || (def.palette?.[2]?.hex) || '#888';
  });
  return out;
}

// ── Tabs ──
function switchTab(tab) {
  _activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

  if (tab === 'layers') renderLayersTab();
  else if (tab === 'tokens') renderTokensTab();
  else if (tab === 'keywords') renderKeywordsTab();
  else if (tab === 'batch') renderBatchTab();
}

// ── Layers tab ──
function renderLayersTab() {
  // Sidebar: layer list
  LayerPanel.init(sidebarLeft, _layers, handleLayerPanelEvent);

  // Center: asset panel (inicia vacío)
  AssetPanel.init(centerContent, handleAssetPanelEvent);
}

function handleLayerPanelEvent({ type, data }) {
  if (type === 'layer-select') {
    AssetPanel.setLayer(data);
  } else if (type === 'layer-reorder') {
    _layers = data;
    markDirty();
    PreviewPanel.updateLayers(_layers);
    buildLayerToggles();
  } else if (type === 'layer-edit') {
    openLayerEditModal(data);
  } else if (type === 'layer-new') {
    openLayerEditModal(null);
  }
}

function handleAssetPanelEvent({ type, data }) {
  if (type === 'asset-add' || type === 'asset-remove') {
    markDirty();
    PreviewPanel.updateLayers(_layers);
  } else if (type === 'asset-select') {
    openAssetEditModal(data.layer, data.asset);
  }
}

// ── Layer edit modal ──
function openLayerEditModal(layer) {
  const isNew = !layer;
  const data = layer ? { ...layer } : {
    order: _layers.length,
    id: '', label: '', type: 'svg', blendMode: 'normal',
    locked: false, colorBinding: null, svgTarget: null, optional: false, assets: []
  };

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  const box = document.createElement('div');
  box.className = 'modal-box';
  box.innerHTML = `
    <div class="modal-header">
      <h2>${isNew ? 'Nueva capa' : 'Editar capa: ' + data.label}</h2>
      <button class="btn-icon modal-close">✕</button>
    </div>
    <div class="layer-modal-grid">
      <div class="form-row">
        <label>ID (único)</label>
        <input id="lm-id" value="${data.id}" ${!isNew?'disabled':''} placeholder="hair-back">
      </div>
      <div class="form-row">
        <label>Label (display)</label>
        <input id="lm-label" value="${data.label}" placeholder="Cabello atrás">
      </div>
      <div class="form-row">
        <label>Orden</label>
        <input id="lm-order" type="number" value="${data.order}" min="0">
      </div>
      <div class="form-row">
        <label>Tipo</label>
        <select id="lm-type">
          <option value="svg"    ${data.type==='svg'?'selected':''}>SVG</option>
          <option value="png"    ${data.type==='png'?'selected':''}>PNG</option>
          <option value="background" ${data.type==='background'?'selected':''}>Background</option>
        </select>
      </div>
      <div class="form-row">
        <label>Blend mode</label>
        <select id="lm-blend">
          ${['normal','multiply','screen','overlay','darken','lighten','color-dodge','color-burn','hard-light','soft-light','difference','exclusion']
            .map(m => `<option ${data.blendMode===m?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <label>Color binding (token)</label>
        <select id="lm-binding">
          <option value="">— ninguno —</option>
          ${(_tokens.tokens||[]).map(t => `<option value="${t.id}" ${data.colorBinding===t.id?'selected':''}>${t.id} — ${t.label}</option>`).join('')}
        </select>
      </div>
      <div class="form-row">
        <label>SVG target clase (.xxx)</label>
        <input id="lm-target" value="${data.svgTarget||''}" placeholder=".skin-fill">
      </div>
      <div class="form-row" style="flex-direction:row;align-items:center;gap:8px">
        <label>Locked</label>
        <input type="checkbox" id="lm-locked" ${data.locked?'checked':''}>
        <label>Opcional</label>
        <input type="checkbox" id="lm-optional" ${data.optional?'checked':''}>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm modal-close">Cancelar</button>
      <button class="btn-sm btn-accent" id="lm-save">Guardar</button>
    </div>`;

  overlay.appendChild(box);
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  box.querySelectorAll('.modal-close').forEach(b => b.onclick = close);

  box.querySelector('#lm-save').onclick = () => {
    const id    = box.querySelector('#lm-id').value.trim();
    const label = box.querySelector('#lm-label').value.trim();
    if (!id || !label) { showToast('ID y Label son obligatorios', 'error'); return; }
    if (isNew && _layers.find(l => l.id === id)) { showToast('Ya existe una capa con ese ID', 'error'); return; }

    const updated = {
      ...data,
      id, label,
      order:       parseInt(box.querySelector('#lm-order').value) || 0,
      type:        box.querySelector('#lm-type').value,
      blendMode:   box.querySelector('#lm-blend').value,
      colorBinding:box.querySelector('#lm-binding').value || null,
      svgTarget:   box.querySelector('#lm-target').value.trim() || null,
      locked:      box.querySelector('#lm-locked').checked,
      optional:    box.querySelector('#lm-optional').checked,
      assets:      data.assets || []
    };

    if (isNew) {
      _layers.push(updated);
    } else {
      const idx = _layers.findIndex(l => l.id === id);
      if (idx !== -1) _layers[idx] = updated;
    }

    _layers.sort((a,b) => a.order - b.order);
    markDirty();
    LayerPanel.refresh(_layers);
    PreviewPanel.updateLayers(_layers);
    buildLayerToggles();
    close();
    showToast('Capa guardada', 'success');
  };
}

// ── Asset edit modal ──
function openAssetEditModal(layer, asset) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const box = document.createElement('div');
  box.className = 'modal-box';
  box.innerHTML = `
    <div class="modal-header">
      <h2>Editar asset: ${asset.label}</h2>
      <button class="btn-icon modal-close">✕</button>
    </div>
    <div class="wizard-form">
      <div class="form-row"><label>ID</label><input id="ae-id" value="${asset.id}" disabled></div>
      <div class="form-row"><label>Label</label><input id="ae-label" value="${asset.label}"></div>
      <div class="form-row"><label>Tags (separados por coma)</label><input id="ae-tags" value="${(asset.tags||[]).join(', ')}"></div>
      <div class="form-row"><label>Keyword requerida (opcional)</label>
        <select id="ae-kw">
          <option value="">— ninguna —</option>
          ${(_kwConfig.keywords||[]).map(k=>`<option value="${k.keyword}" ${asset.fromKeyword===k.keyword?'selected':''}>${k.keyword} — ${k.label}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm modal-close">Cancelar</button>
      <button class="btn-sm btn-accent" id="ae-save">Guardar</button>
    </div>`;

  overlay.appendChild(box);
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  box.querySelectorAll('.modal-close').forEach(b => b.onclick = close);

  box.querySelector('#ae-save').onclick = () => {
    const idx = layer.assets.findIndex(a => a.id === asset.id);
    if (idx !== -1) {
      layer.assets[idx].label = box.querySelector('#ae-label').value.trim();
      layer.assets[idx].tags = box.querySelector('#ae-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
      const kw = box.querySelector('#ae-kw').value;
      if (kw) layer.assets[idx].fromKeyword = kw; else delete layer.assets[idx].fromKeyword;
    }
    markDirty();
    AssetPanel.setLayer(layer);
    close();
    showToast('Asset actualizado', 'success');
  };
}

// ── Tokens tab ──
function renderTokensTab() {
  sidebarLeft.innerHTML = '<div class="empty-state">Tokens de color</div>';
  centerContent.innerHTML = '';

  const list = document.createElement('div');
  list.className = 'token-admin-list';

  const tokenList = _tokens.tokens || [];
  tokenList.forEach(def => {
    const tokenId = def.id;
    const card = document.createElement('div');
    card.className = 'token-admin-card';

    const bindings = _layers.filter(l => l.colorBinding === tokenId).map(l => l.label).join(', ') || '—';

    card.innerHTML = `
      <div class="token-admin-header">
        <span class="token-admin-name">${def.label} <code style="font-size:10px;color:var(--text-muted)">${tokenId}</code></span>
        <span class="token-type-badge">${def.type}</span>
      </div>
      <div class="token-bindings" style="margin-bottom:10px">Capas vinculadas: ${bindings}</div>
      ${def.palette ? `<div class="token-palette" id="palette-${tokenId}"></div>
        <button class="btn-sm" id="btn-add-color-${tokenId}">+ Agregar color</button>` : ''}
      ${def.type === 'picker' ? `<div class="token-bindings">Picker cromático — constraints: S≥${def.constraints?.saturation?.min||0}%, L ${def.constraints?.lightness?.min||0}–${def.constraints?.lightness?.max||100}%</div>` : ''}
    `;

    list.appendChild(card);

    if (def.palette) {
      const paletteEl = card.querySelector(`#palette-${tokenId}`);
      def.palette.forEach((c, idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'token-swatch-wrap';
        wrap.innerHTML = `
          <div class="token-swatch" style="background:${c.hex}" title="${c.name} ${c.hex}"></div>
          <span class="token-swatch-label">${c.name}</span>`;
        wrap.querySelector('.token-swatch').onclick = () => {
          if (confirm(`¿Eliminar color "${c.name}" (${c.hex})?`)) {
            def.palette.splice(idx, 1);
            markDirty();
            renderTokensTab();
          }
        };
        paletteEl.appendChild(wrap);
      });

      card.querySelector(`#btn-add-color-${tokenId}`).onclick = () => {
        const name = prompt('Nombre del color:');
        if (!name) return;
        const hex = prompt('Hex del color (ej: #FF5733):');
        if (!hex || !/^#[0-9A-Fa-f]{6}$/.test(hex)) { showToast('Hex inválido', 'error'); return; }
        def.palette.push({ name, hex });
        markDirty();
        renderTokensTab();
      };
    }
  });

  centerContent.appendChild(list);
}

// ── Keywords tab ──
function renderKeywordsTab() {
  sidebarLeft.innerHTML = '<div class="empty-state">Gestión de keywords</div>';
  KeywordPanel.init(centerContent, _kwConfig, _layers, (updated) => {
    _kwConfig = updated;
    markDirty();
  });
}

// ── Preview layer toggles ──
function buildLayerToggles() {
  const list = document.getElementById('layer-toggle-list');
  if (!list) return;
  list.innerHTML = '';
  const sorted = [..._layers].sort((a,b) => a.order - b.order);
  sorted.forEach(layer => {
    const item = document.createElement('div');
    item.className = 'layer-toggle-item';
    item.innerHTML = `
      <label class="toggle">
        <input type="checkbox" checked data-layer="${layer.id}">
        <span class="toggle-track"></span>
      </label>
      <span>${layer.label}</span>
      <span style="font-size:10px;color:var(--text-muted);margin-left:auto">${layer.blendMode}</span>`;
    item.querySelector('input').onchange = e => {
      PreviewPanel.setLayerVisible(layer.id, e.target.checked);
    };
    list.appendChild(item);
  });
}

// ── Dirty / save ──
function markDirty() {
  _dirty = true;
  const el = document.getElementById('save-status');
  el.textContent = '● Sin guardar';
  el.className = 'unsaved';
  document.getElementById('btn-save-manual').classList.add('visible');
  _saveLayers();
}

// ── Export preview ──
function exportPreviewPNG() {
  const src = previewCanvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = src;
  a.download = 'avatar-admin-preview-' + Date.now() + '.png';
  a.click();
}

// ── Toast ──
function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Batch upload tab ──
function renderBatchTab() {
  sidebarLeft.innerHTML = `
    <div style="padding:12px">
      <div class="panel-title" style="margin-bottom:10px">Nomenclatura</div>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.7">
        <code>head-*</code> → Rostro<br>
        <code>hair-back-*</code> → Cabello atrás<br>
        <code>hair-front-*</code> → Cabello frente<br>
        <code>hair-*</code> → Cabello atrás<br>
        <code>acc-back-*</code> → Acc. atrás<br>
        <code>acc-front-*</code> → Acc. frente<br>
        <code>acc-face-*</code> → Lentes<br>
        <code>glasses-*</code> → Lentes<br>
        <code>bg-*</code> → Fondo<br>
        <code>shirt-*</code> → Camiseta<br>
        <code>body-*</code> → Cuerpo<br>
        <code>mask-*</code> → Máscara<br>
        <code>fhair-*</code> → Vello facial<br>
        <code>frame-*</code> → Marco<br>
        <code>emotion-*</code> → Emoción
      </div>
    </div>`;

  centerContent.innerHTML = '';

  // ── Estado local del batch ──
  let _batchItems = [];

  // ── Drop zone ──
  const dropzone = document.createElement('div');
  dropzone.className = 'dropzone';
  dropzone.style.marginBottom = '16px';
  dropzone.innerHTML = `
    <div style="font-size:28px;margin-bottom:8px">📂</div>
    <div style="font-size:13px;font-weight:600;margin-bottom:4px">Arrastra tus SVG/PNG aquí</div>
    <div style="font-size:11px;margin-bottom:12px">o haz clic para seleccionar archivos</div>
    <input type="file" id="batch-file-input" multiple accept=".svg,.png,.jpg" style="display:none">
    <label for="batch-file-input" class="btn-sm btn-accent" style="cursor:pointer">Seleccionar archivos</label>`;
  centerContent.appendChild(dropzone);

  // ── Tabla de resultados ──
  const resultArea = document.createElement('div');
  resultArea.id = 'batch-result-area';
  centerContent.appendChild(resultArea);

  // Eventos drag & drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('active'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('active'));
  dropzone.addEventListener('drop', async e => {
    e.preventDefault();
    dropzone.classList.remove('active');
    await _processBatchFiles([...e.dataTransfer.files]);
  });
  dropzone.querySelector('#batch-file-input').addEventListener('change', async e => {
    await _processBatchFiles([...e.target.files]);
    e.target.value = '';
  });

  async function _processBatchFiles(files) {
    resultArea.innerHTML = '<div style="color:var(--text-muted);padding:12px">Procesando...</div>';
    _batchItems = await BatchUploader.processFiles(files);
    _renderBatchTable();
  }

  function _renderBatchTable() {
    resultArea.innerHTML = '';
    if (!_batchItems.length) return;

    const groups = BatchUploader.groupByLayer(_batchItems);
    const layerOptions = ['', ..._layers.map(l => l.id)].map(id =>
      `<option value="${id}">${id || '— seleccionar —'}</option>`
    ).join('');

    // Stats header
    const valid   = _batchItems.filter(i => i.valid).length;
    const invalid = _batchItems.length - valid;
    const statsBar = document.createElement('div');
    statsBar.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:12px;font-size:12px';
    statsBar.innerHTML = `
      <span style="color:var(--success)">✓ ${valid} válidos</span>
      ${invalid ? `<span style="color:var(--danger)">✗ ${invalid} con errores</span>` : ''}
      <span style="color:var(--text-muted)">${_batchItems.length} archivos total</span>
      <button class="btn-sm btn-accent" id="btn-apply-batch" style="margin-left:auto"
        ${valid === 0 ? 'disabled' : ''}>Aplicar ${valid} assets →</button>`;
    resultArea.appendChild(statsBar);

    // Tabla agrupada por capa
    for (const [groupKey, items] of Object.entries(groups)) {
      const section = document.createElement('div');
      section.style.cssText = 'margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden';

      const layerLabel = _layers.find(l => l.id === groupKey)?.label || groupKey;
      section.innerHTML = `
        <div style="padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)">
          ${groupKey === '__unknown__' ? '⚠ Sin capa detectada' : `${layerLabel} <code style="font-weight:400;text-transform:none">${groupKey}</code>`}
          <span style="margin-left:8px;color:var(--text)">${items.length} archivo${items.length>1?'s':''}</span>
        </div>`;

      const table = document.createElement('table');
      table.style.cssText = 'width:100%;border-collapse:collapse';
      table.innerHTML = `
        <thead>
          <tr style="font-size:10px;color:var(--text-muted);border-bottom:1px solid var(--border)">
            <th style="padding:6px 12px;text-align:left;width:52px">Preview</th>
            <th style="padding:6px 12px;text-align:left">Archivo</th>
            <th style="padding:6px 12px;text-align:left;width:180px">Capa destino</th>
            <th style="padding:6px 12px;text-align:left;width:80px">Estado</th>
          </tr>
        </thead>
        <tbody id="tbody-${groupKey.replace(/[^a-z0-9]/g,'-')}"></tbody>`;
      section.appendChild(table);
      resultArea.appendChild(section);

      const tbody = table.querySelector('tbody');
      items.forEach((item, idx) => {
        const tr = document.createElement('tr');
        tr.style.cssText = 'border-bottom:1px solid var(--border);transition:background .1s';
        tr.onmouseenter = () => tr.style.background = 'var(--surface2)';
        tr.onmouseleave = () => tr.style.background = '';

        const statusHtml = item.valid
          ? `<span style="color:var(--success)">✓ OK${item.warnings.length ? ` <span style="color:var(--warn)" title="${item.warnings.join(' | ')}">⚠</span>` : ''}</span>`
          : `<span style="color:var(--danger)" title="${item.errors.join(' | ')}">✗ Error</span>`;

        const selectedLayer = item.assignedLayer || item.detectedLayer || '';
        const opts = layerOptions.replace(
          `value="${selectedLayer}"`,
          `value="${selectedLayer}" selected`
        );

        tr.innerHTML = `
          <td style="padding:6px 12px">
            ${item.previewUrl
              ? `<img src="${item.previewUrl}" style="width:40px;height:40px;object-fit:contain;border-radius:4px;background:#111">`
              : `<div style="width:40px;height:40px;background:var(--surface2);border-radius:4px"></div>`}
          </td>
          <td style="padding:6px 12px;font-size:11px;font-family:monospace;color:var(--text)">${item.name}</td>
          <td style="padding:6px 12px">
            <select class="layer-assign" data-item-idx="${_batchItems.indexOf(item)}" style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 6px;color:var(--text);font-size:11px;width:100%">
              ${opts}
            </select>
          </td>
          <td style="padding:6px 12px;font-size:11px">${statusHtml}</td>`;
        tbody.appendChild(tr);
      });
    }

    // Eventos en selects de corrección de capa
    resultArea.querySelectorAll('.layer-assign').forEach(sel => {
      sel.onchange = () => {
        const idx = parseInt(sel.dataset.itemIdx);
        _batchItems[idx].assignedLayer = sel.value || null;
        // Re-render conservando items
        const current = _batchItems;
        _batchItems = current;
        // Solo actualizar stats bar
        const valid = _batchItems.filter(i => i.valid && (i.assignedLayer || i.detectedLayer)).length;
        const applyBtn = resultArea.querySelector('#btn-apply-batch');
        if (applyBtn) applyBtn.textContent = `Aplicar ${valid} assets →`;
      };
    });

    // Botón Aplicar
    const applyBtn = resultArea.querySelector('#btn-apply-batch');
    if (applyBtn) {
      applyBtn.onclick = () => {
        const { added, skipped, copyInstructions } = BatchUploader.applyToLayers(_batchItems, _layers);

        if (added === 0) {
          showToast('No se agregaron assets (duplicados o sin capa)', 'error');
          return;
        }

        markDirty();
        LayerPanel.refresh?.(_layers);
        PreviewPanel.updateLayers?.(_layers);

        // Instrucciones de copia
        _renderCopyInstructions(copyInstructions, added, skipped);
        showToast(`✓ ${added} assets agregados a la config`, 'success');
      };
    }
  }

  function _renderCopyInstructions(instructions, added, skipped) {
    const existing = resultArea.querySelector('#copy-instructions');
    if (existing) existing.remove();

    const box = document.createElement('div');
    box.id = 'copy-instructions';
    box.style.cssText = 'margin-top:16px;background:var(--surface);border:1px solid var(--warn);border-radius:var(--radius);padding:14px';

    const grouped = {};
    instructions.forEach(({ file, dest }) => {
      if (!grouped[dest]) grouped[dest] = [];
      grouped[dest].push(file);
    });

    let html = `
      <div style="font-size:12px;font-weight:700;color:var(--warn);margin-bottom:10px">
        ✓ ${added} assets añadidos · ${skipped} omitidos
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px">
        Copia los archivos a las carpetas correspondientes del proyecto:
      </div>`;

    for (const [dest, files] of Object.entries(grouped)) {
      html += `<div style="margin-bottom:8px">
        <code style="color:var(--accent2);font-size:11px">${dest}</code>
        <div style="margin-top:4px;margin-left:12px;font-size:11px;color:var(--text)">
          ${files.map(f => `• ${f}`).join('<br>')}
        </div>
      </div>`;
    }

    html += `<div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn-sm btn-accent" id="btn-export-after-batch">↓ Exportar layer-config.json</button>
    </div>`;

    box.innerHTML = html;
    resultArea.appendChild(box);

    box.querySelector('#btn-export-after-batch').onclick = () => {
      AssetManager.exportLayerConfig(_layers);
    };
  }
}

// ── Refresh all after import ──
function refreshAll() {
  PreviewPanel.updateLayers(_layers);
  buildLayerToggles();
  switchTab(_activeTab);
}

// ── Arranque ──
init().catch(console.error);
</script>
