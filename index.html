<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar OS — Builder</title>
  <style>
    :root {
      --bg:        #0E0E12;
      --surface:   #1A1A22;
      --surface2:  #22222E;
      --border:    #2E2E3E;
      --accent:    #7C5CFC;
      --accent2:   #C084FC;
      --text:      #F0F0F8;
      --text-muted:#888898;
      --radius:    10px;
      --unlock:    #F1C40F;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .collection-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Layout principal ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Preview ── */
    #preview-col {
      width: 520px;
      min-width: 520px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      border-right: 1px solid var(--border);
    }
    #canvas-wrap {
      position: relative;
      width: 480px;
      height: 480px;
      border-radius: var(--radius);
      overflow: hidden;
      background: #111;
      box-shadow: 0 8px 40px rgba(124,92,252,0.15);
    }
    #avatar-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #render-spinner {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(14,14,18,0.6);
      font-size: 28px;
    }
    #render-spinner.active { display: flex; }

    /* ── Controles bottom canvas ── */
    .canvas-controls {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { opacity: .8; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-primary:hover { opacity: .9; }

    /* ── Panel de opciones ── */
    #options-col {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #options-col::-webkit-scrollbar { width: 5px; }
    #options-col::-webkit-scrollbar-track { background: transparent; }
    #options-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Secciones ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 12px 0 6px;
    }

    /* ── Layer row ── */
    .layer-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 12px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .layer-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .layer-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .locked-badge {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Asset grid ── */
    .asset-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .asset-btn {
      position: relative;
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: var(--surface2);
      border: 2px solid transparent;
      cursor: pointer;
      overflow: hidden;
      transition: border-color .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }
    .asset-btn:hover { border-color: var(--border); }
    .asset-btn.selected { border-color: var(--accent); }
    .asset-btn.locked-asset { opacity: .45; cursor: not-allowed; }
    .asset-btn canvas {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
    }
    .unlock-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      font-size: 9px;
      color: var(--unlock);
      line-height: 1;
    }

    /* ── Color token row ── */
    .token-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .token-label {
      font-size: 12px;
      color: var(--text-muted);
      width: 90px;
      flex-shrink: 0;
    }
    .preset-grid {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .1s, border-color .15s;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: #fff; }

    /* ── Hair picker custom ── */
    #hair-picker-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
    }
    #hair-presets-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    #hair-wheel-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    #hair-canvas-wheel {
      border-radius: 50%;
      cursor: crosshair;
      border: 2px solid var(--border);
      flex-shrink: 0;
      touch-action: none;
    }
    #hair-preview-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.2);
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    #hair-hex-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-family: monospace; }
    #hair-lightness-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    #hair-lightness-label { font-size: 10px; color: var(--text-muted); width: 28px; }
    #hair-lightness {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      background: linear-gradient(90deg, #1A1A1A, #8B4513, #FFF);
    }
    #hair-lightness::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid var(--border);
      cursor: pointer;
    }

    /* ── Pair selector (hair style / head accessory) ── */
    .pair-btn {
      position: relative;
      min-width: 56px;
      height: 56px;
      border-radius: 8px;
      background: var(--surface2);
      border: 2px solid transparent;
      cursor: pointer;
      overflow: hidden;
      transition: border-color .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--text-muted);
      padding: 4px 6px;
      gap: 2px;
    }
    .pair-btn:hover { border-color: var(--border); }
    .pair-btn.selected { border-color: var(--accent); }
    .pair-btn canvas {
      width: 40px;
      height: 40px;
      border-radius: 4px;
    }
    .pair-btn .pair-label {
      font-size: 9px;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 52px;
    }

    /* ── Compat toast ── */
    .compat-toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,20,60,.95);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 8px 18px;
      font-size: 12px;
      color: var(--text);
      z-index: 50;
      animation: toastIn .2s ease, toastOut .3s ease 2s forwards;
      white-space: nowrap;
    }
    @keyframes toastIn  { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes toastOut { to   { opacity:0; transform:translateX(-50%) translateY(10px); } }

    /* ── Keyword input ── */
    .keyword-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    #keyword-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      letter-spacing: 1px;
    }
    #keyword-input:focus { outline: 1px solid var(--accent); }
    #keyword-submit {
      padding: 8px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #keyword-feedback {
      font-size: 11px;
      padding: 4px 0;
      min-height: 18px;
    }
    #keyword-feedback.success { color: var(--unlock); }
    #keyword-feedback.error   { color: #F56565; }

    /* ── Modal exportación ── */
    #export-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #export-modal.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 28px 24px;
      width: 420px;
      max-width: 100%;
      max-height: 96vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: modalIn .25s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modalIn {
      from { opacity:0; transform: scale(.92) translateY(12px); }
      to   { opacity:1; transform: scale(1)   translateY(0); }
    }
    #export-canvas-wrap {
      width: 280px;
      height: 280px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(124,92,252,.2);
    }
    #export-preview {
      width: 100%;
      height: 100%;
      display: block;
    }
    .modal-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .modal-sub   { font-size: 11px; color: var(--text-muted); text-align: center; letter-spacing: .5px; }
    .modal-actions { display: flex; gap: 10px; width: 100%; }
    #modal-close {
      position: absolute;
      top: 14px; right: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 28px; height: 28px;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    #modal-close:hover { background: var(--border); color: var(--text); }

    /* ── Confetti ── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      display: none;
    }

    /* ── Responsive ── */
    @media (max-width: 860px) {
      main { flex-direction: column; }
      #preview-col {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 16px;
      }
      #canvas-wrap { width: 320px; height: 320px; }
      #options-col { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>AVATAR OS</h1>
  <span class="collection-badge" id="collection-label">Colección 6</span>
</header>

<main>
  <!-- ── Preview ── -->
  <div id="preview-col">
    <div id="canvas-wrap">
      <canvas id="avatar-canvas" width="1000" height="1000"></canvas>
      <div id="render-spinner">⟳</div>
    </div>
    <div class="canvas-controls">
      <button class="btn btn-ghost" id="btn-random">🎲 Aleatorio</button>
      <button class="btn btn-ghost" id="btn-sync" title="Cargar últimos assets">↻</button>
      <button class="btn btn-primary" id="btn-export">✨ Exportar</button>
    </div>
  </div>

  <!-- ── Panel opciones ── -->
  <div id="options-col">
    <div class="section-label">ESCENA</div>
    <div id="slot-background" class="layer-row"></div>
    <div id="slot-emotion"    class="layer-row"></div>

    <div class="section-label">AVATAR</div>
    <!-- Token: skin-color -->
    <div class="token-row">
      <span class="token-label">Tono de piel</span>
      <div class="preset-grid" id="token-skin-color"></div>
    </div>
    <!-- Token: hair-color -->
    <div class="token-row" style="flex-direction:column;align-items:flex-start;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="token-label">Color cabello</span>
        <div id="hair-preview-swatch" style="width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.2)"></div>
        <span id="hair-hex-label" style="font-size:11px;color:var(--text-muted);font-family:monospace"></span>
      </div>
      <div class="preset-grid" id="token-hair-color"></div>
    </div>
    <!-- Capas individuales -->
    <div id="slot-head"      class="layer-row"></div>
    <div id="slot-hair-back" class="layer-row"></div>
    <div id="slot-hair-front"class="layer-row"></div>
    <div id="slot-shirt"     class="layer-row"></div>

    <div class="section-label">EXTRAS</div>
    <div id="slot-facial-hair" class="layer-row"></div>
    <div id="slot-acc-back"    class="layer-row"></div>
    <div id="slot-acc-front"   class="layer-row"></div>
    <div id="slot-acc-face"    class="layer-row"></div>

    <div class="section-label">MÁSCARA</div>
    <div id="slot-mask" class="layer-row"></div>

    <div class="section-label">EFECTOS</div>
    <div id="slot-effect-front" class="layer-row"></div>
    <div id="slot-effect-final" class="layer-row"></div>

    <div class="section-label">LOGOS</div>
    <div id="slot-frame" class="layer-row"></div>

    <!-- Keyword -->
    <div class="section-label">CLAVE ESPECIAL</div>
    <div class="keyword-row" style="flex-direction:column;gap:8px">
      <div style="display:flex;gap:8px">
        <input id="keyword-input" placeholder="🔑 Tengo una clave..." maxlength="40">
        <button id="keyword-submit">Activar</button>
      </div>
      <div id="keyword-feedback"></div>
    </div>
  </div>
</main>

<!-- ── Modal exportación ── -->
<div id="export-modal">
  <div class="modal-box" style="position:relative">
    <button id="modal-close">×</button>
    <div id="export-canvas-wrap">
      <canvas id="export-preview" width="1000" height="1000"></canvas>
    </div>
    <div class="modal-title" id="export-title">Tu Avatar</div>
    <div class="modal-sub" id="export-sub">Colección 6 · Avatar OS</div>
    <div id="export-message" style="font-size:12px;color:var(--text-muted);text-align:center;max-width:320px;line-height:1.5"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-download">⬇ Descargar PNG</button>
      <button class="btn btn-primary" id="btn-share">↗ Compartir</button>
    </div>
  </div>
</div>

<canvas id="confetti-canvas"></canvas>

<!-- Scripts v3 -->
<script src="js/svg-processor.js?v=3"></script>
<script src="js/asset-loader.js?v=1"></script>
<script src="js/state.js?v=3"></script>
<script src="js/engine.js?v=3"></script>

<script>
// ── App Builder v3 ─────────────────────────────────────────────────────────

let _layers   = [];
let _registry = { assets: [] };
let _renderTimer = null;

const canvas  = document.getElementById('avatar-canvas');
const spinner = document.getElementById('render-spinner');

// Presets de colores hardcodeados (sin archivo externo)
const SKIN_PRESETS = [
  { hex: '#FDDBB4', name: 'Marfil' },
  { hex: '#F9C7B6', name: 'Melocotón' },
  { hex: '#D4956A', name: 'Caramelo' },
  { hex: '#A0622D', name: 'Marrón' },
  { hex: '#7B4016', name: 'Oscuro' },
];
const HAIR_PRESETS = [
  { hex: '#F9C19A', name: 'Rubio' },
  { hex: '#C0832A', name: 'Castaño claro' },
  { hex: '#8B4513', name: 'Castaño' },
  { hex: '#3D1C02', name: 'Negro' },
  { hex: '#00B181', name: 'Verde' },
  { hex: '#7C5CFC', name: 'Violeta' },
  { hex: '#E84393', name: 'Rosa' },
  { hex: '#9FA8A3', name: 'Gris' },
];

// ── Init ──
async function init() {
  State.load();

  const t = Date.now();
  const [layersData, registryData] = await Promise.all([
    fetch(`data/layer-config.json?t=${t}`).then(r => r.json()),
    fetch(`data/asset-registry.json?t=${t}`).then(r => r.json()),
  ]);

  // Preferir datos del admin (localStorage) sobre los archivos JSON si existen
  const adminLayers   = localStorage.getItem('avatar-os-admin-layers-v3');
  const adminRegistry = localStorage.getItem('avatar-os-admin-registry-v3');

  _layers   = (adminLayers   ? JSON.parse(adminLayers)   : layersData).layers.sort((a, b) => a.order - b.order);
  _registry = adminRegistry  ? JSON.parse(adminRegistry) : registryData;

  // Selección inicial aleatoria si no hay estado guardado
  if (!Object.keys(State.getSelectedAssets()).length) {
    _applyRandomSelections();
  }

  buildColorUI();
  buildLayersUI();
  scheduleRender();

  document.getElementById('btn-random').onclick = doRandom;
  document.getElementById('btn-sync').onclick   = doSync;
  document.getElementById('btn-export').onclick = openExportModal;
  document.getElementById('modal-close').onclick = closeExportModal;
  document.getElementById('export-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('export-modal')) closeExportModal();
  });
  document.getElementById('btn-download').onclick = downloadPNG;
  document.getElementById('btn-share').onclick = sharePNG;
  document.getElementById('keyword-submit').onclick = handleKeyword;
  document.getElementById('keyword-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleKeyword();
  });
}

// ── Assets por capa ──
function _assetsForLayer(layerId) {
  return _registry.assets.filter(a => a.layerId === layerId);
}

// Selecciona asset y auto-selecciona el mismo grupo en capas vinculadas
function _selectWithLinks(layerId, assetId) {
  State.setSelectedAsset(layerId, assetId);
  const layer = _layers.find(l => l.id === layerId);
  const asset = _registry.assets.find(a => a.id === assetId);
  if (!layer?.linkedLayers?.length || !asset?.group) return;
  layer.linkedLayers.forEach(linkedId => {
    const match = _registry.assets.find(a => a.layerId === linkedId && a.group === asset.group);
    if (match) {
      State.setSelectedAsset(linkedId, match.id);
      refreshLayerGrid(linkedId);
    }
  });
}

// ── Randomización ──
function _applyRandomSelections() {
  // Capas sin vínculos primero para que los grupos ya estén resueltos
  const sorted = [..._layers].sort((a, b) => {
    const aL = (a.linkedLayers||[]).length > 0 ? 1 : 0;
    const bL = (b.linkedLayers||[]).length > 0 ? 1 : 0;
    return aL - bL || a.order - b.order;
  });
  const settled = new Set();
  sorted.forEach(layer => {
    if (settled.has(layer.id)) return;
    const assets = _assetsForLayer(layer.id).filter(a => a.src !== undefined);
    if (assets.length) {
      const pick = assets[Math.floor(Math.random() * assets.length)];
      _selectWithLinks(layer.id, pick.id);
      (layer.linkedLayers || []).forEach(id => settled.add(id));
    }
  });
}

function doRandom() {
  // Tokens aleatorios
  const skin = SKIN_PRESETS[Math.floor(Math.random() * SKIN_PRESETS.length)];
  const hair = HAIR_PRESETS[Math.floor(Math.random() * HAIR_PRESETS.length)];
  State.setToken('skin-color', skin.hex);
  State.setToken('hair-color', hair.hex);
  Engine.clearCache();
  AssetLoader.clearCache();
  _syncSwatchSelected('skin-color', skin.hex);
  _syncSwatchSelected('hair-color', hair.hex);
  _applyRandomSelections();
  refreshLayersUI();
  scheduleRender();
}

// ── Sync ──
async function doSync() {
  const btn = document.getElementById('btn-sync');
  btn.textContent = '…';
  btn.disabled = true;
  try {
    const t = Date.now();
    const [ld, rd] = await Promise.all([
      fetch(`data/layer-config.json?t=${t}`).then(r => r.json()),
      fetch(`data/asset-registry.json?t=${t}`).then(r => r.json()),
    ]);
    _layers   = ld.layers.sort((a, b) => a.order - b.order);
    _registry = rd;
    Engine.clearCache();
    AssetLoader.clearCache();
    buildLayersUI();
    scheduleRender();
  } catch(e) {
    console.error('Sync error', e);
  } finally {
    btn.textContent = '↻';
    btn.disabled = false;
  }
}

// ── Render ──
function scheduleRender() {
  if (_renderTimer) clearTimeout(_renderTimer);
  _renderTimer = setTimeout(doRender, 40);
}

async function doRender() {
  spinner.classList.add('active');
  try {
    await Engine.render(canvas, _layers, _registry, State);
  } catch(e) {
    console.error('Render error', e);
  } finally {
    spinner.classList.remove('active');
  }
}

// Conjunto de capas que son controladas automáticamente por otra (no se muestran)
function _controlledLayerIds() {
  const controlled = new Set();
  _layers.forEach(l => (l.linkedLayers || []).forEach(id => controlled.add(id)));
  return controlled;
}

// ── Build UI ──
function buildLayersUI() {
  const controlled = _controlledLayerIds();
  _layers.forEach(layer => {
    const slot = document.getElementById('slot-' + layer.id);
    if (!slot) return;
    // Ocultar capas auto-controladas (ej. hair-back cuando hair-front la vincula)
    if (controlled.has(layer.id)) { slot.style.display = 'none'; return; }
    slot.style.display = '';
    slot.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'layer-row-header';
    const nameEl = document.createElement('span');
    nameEl.className = 'layer-name';
    nameEl.textContent = layer.label;
    header.appendChild(nameEl);
    slot.appendChild(header);
    const grid = document.createElement('div');
    grid.className = 'asset-grid';
    grid.id = 'grid-' + layer.id;
    slot.appendChild(grid);
    refreshLayerGrid(layer.id);
  });
}

function refreshLayersUI() {
  _layers.forEach(l => refreshLayerGrid(l.id));
}

function refreshLayerGrid(layerId) {
  const grid = document.getElementById('grid-' + layerId);
  if (!grid) return;
  const layer = _layers.find(l => l.id === layerId);
  const assets = _assetsForLayer(layerId);
  const selected = State.getSelectedAsset(layerId);

  // Capas vinculadas para thumbnails compuestos
  const linkedLayers = (layer.linkedLayers || [])
    .map(id => _layers.find(l => l.id === id))
    .filter(Boolean);

  grid.innerHTML = '';
  assets.forEach(asset => {
    const btn = document.createElement('button');
    btn.className = 'asset-btn' + (asset.id === selected ? ' selected' : '');
    btn.title = asset.label;

    if (!asset.src) {
      const ctx2 = document.createElement('canvas');
      ctx2.width = ctx2.height = 48;
      const c = ctx2.getContext('2d');
      c.fillStyle = '#1A1A22'; c.fillRect(0,0,48,48);
      c.strokeStyle = '#555'; c.lineWidth = 2.5;
      c.beginPath(); c.moveTo(16,16); c.lineTo(32,32); c.moveTo(32,16); c.lineTo(16,32); c.stroke();
      btn.appendChild(ctx2);
    } else {
      const thumb = document.createElement('canvas');
      thumb.width = thumb.height = 48;
      btn.appendChild(thumb);
      // Si hay capas vinculadas y el asset tiene grupo, renderizar compuesto
      if (linkedLayers.length && asset.group) {
        _renderThumbComposite(thumb, asset, layer, linkedLayers);
      } else {
        _renderThumb(thumb, asset, layer);
      }
    }

    btn.onclick = () => {
      _selectWithLinks(layerId, asset.id);
      Engine.clearCache();
      AssetLoader.clearCache();
      refreshLayerGrid(layerId);
      // Refrescar grids de capas vinculadas para marcar selected
      linkedLayers.forEach(ll => refreshLayerGrid(ll.id));
      scheduleRender();
    };
    grid.appendChild(btn);
  });
}

async function _renderThumbComposite(thumbCanvas, asset, layer, linkedLayers) {
  // Recopilar todos los assets del mismo grupo en las capas vinculadas
  const linkedAssets = linkedLayers.map(ll => {
    const match = _registry.assets.find(a => a.layerId === ll.id && a.group === asset.group);
    return match ? { layer: ll, asset: match } : null;
  }).filter(Boolean);

  // Ordenar por order: capas vinculadas debajo, capa principal encima
  const allParts = [
    ...linkedAssets.map(x => ({ layer: x.layer, asset: x.asset })),
    { layer, asset },
  ].sort((a, b) => a.layer.order - b.layer.order);

  const tmp = document.createElement('canvas');
  tmp.width = tmp.height = 512;
  const fakeRegistry = { assets: allParts.map(p => p.asset) };
  const sel = {};
  allParts.forEach(p => { sel[p.layer.id] = p.asset.id; });
  const fakeState = {
    getTokens: () => State.getTokens(),
    getSelectedAssets: () => sel,
  };
  try {
    await Engine.render(tmp, allParts.map(p => p.layer), fakeRegistry, fakeState);
    const ctx = thumbCanvas.getContext('2d');
    ctx.clearRect(0,0,48,48);
    ctx.drawImage(tmp, 0, 0, 48, 48);
  } catch(e) { /* silencioso */ }
}

async function _renderThumb(thumbCanvas, asset, layer) {
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = tmpCanvas.height = 512;
  const fakeRegistry = { assets: [asset] };
  const fakeState = {
    getTokens: () => State.getTokens(),
    getSelectedAssets: () => ({ [layer.id]: asset.id }),
  };
  try {
    await Engine.render(tmpCanvas, [layer], fakeRegistry, fakeState);
    const ctx = thumbCanvas.getContext('2d');
    ctx.clearRect(0,0,48,48);
    ctx.drawImage(tmpCanvas, 0, 0, 48, 48);
  } catch(e) { /* silencioso */ }
}

// ── Color UI ──
function buildColorUI() {
  _buildSwatchRow('token-skin-color', 'skin-color', State.getToken('skin-color') || SKIN_PRESETS[1].hex, SKIN_PRESETS);
  _buildSwatchRow('token-hair-color', 'hair-color', State.getToken('hair-color') || HAIR_PRESETS[2].hex, HAIR_PRESETS);
  // Actualizar swatch de preview en hair picker
  document.getElementById('hair-preview-swatch').style.background = State.getToken('hair-color') || HAIR_PRESETS[2].hex;
  document.getElementById('hair-hex-label').textContent = State.getToken('hair-color') || HAIR_PRESETS[2].hex;
}

function _buildSwatchRow(containerId, tokenId, currentHex, presets) {
  const row = document.getElementById(containerId);
  if (!row) return;
  row.innerHTML = '';
  presets.forEach(p => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (currentHex === p.hex ? ' selected' : '');
    sw.style.background = p.hex;
    sw.title = p.name;
    sw.dataset.hex = p.hex;
    sw.onclick = () => {
      State.setToken(tokenId, p.hex);
      Engine.clearCache();
      AssetLoader.clearCache();
      _syncSwatchSelected(tokenId, p.hex);
      if (tokenId === 'hair-color') {
        document.getElementById('hair-preview-swatch').style.background = p.hex;
        document.getElementById('hair-hex-label').textContent = p.hex;
      }
      scheduleRender();
    };
    row.appendChild(sw);
  });
}

function _syncSwatchSelected(tokenId, hex) {
  const containerId = tokenId === 'skin-color' ? 'token-skin-color' : 'token-hair-color';
  document.querySelectorAll(`#${containerId} .color-swatch`).forEach(s => {
    s.classList.toggle('selected', s.dataset.hex === hex);
  });
}

// ── Hair wheel (simplificado — usa presets en hair-presets-row) ──
function buildHairWheel() {
  // El wheel real requiere ColorEngine que ya no está en v3.
  // Los presets de hair están en #hair-presets-row construidos en buildColorUI.
  // Ocultamos el wheel por ahora.
  const wheelRow = document.getElementById('hair-wheel-row');
  const lightnessWrap = document.getElementById('hair-lightness-wrap');
  if (wheelRow) wheelRow.style.display = 'none';
  if (lightnessWrap) lightnessWrap.style.display = 'none';
}

// ── Toast ──
function showCompatToast(msg) {
  const existing = document.querySelector('.compat-toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'compat-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Export ──
async function openExportModal() {
  document.getElementById('export-modal').classList.add('open');
  const expCanvas = document.getElementById('export-preview');
  await Engine.render(expCanvas, _layers, _registry, State);
  const date = new Date().toLocaleDateString('es', { day:'numeric', month:'long', year:'numeric' });
  document.getElementById('export-title').textContent = 'Tu Avatar';
  document.getElementById('export-sub').textContent = `Avatar OS · ${date}`;
  document.getElementById('export-message').textContent = '¡Tu avatar ha sido creado! Descárgalo y compártelo.';
  launchConfetti();
}

function closeExportModal() {
  document.getElementById('export-modal').classList.remove('open');
  document.getElementById('confetti-canvas').style.display = 'none';
}

function downloadPNG() {
  const expCanvas = document.getElementById('export-preview');
  const a = document.createElement('a');
  a.href = expCanvas.toDataURL('image/png');
  a.download = `avatar-os-${Date.now()}.png`;
  a.click();
}

async function sharePNG() {
  const expCanvas = document.getElementById('export-preview');
  expCanvas.toBlob(async blob => {
    try {
      const file = new File([blob], 'avatar-os.png', { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ title: 'Mi Avatar — Avatar OS', files: [file] });
        return;
      }
    } catch(e) { /* fall through */ }
    try {
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      showCompatToast('✓ Avatar copiado al portapapeles');
    } catch { downloadPNG(); }
  });
}

// ── Confetti ──
function launchConfetti() {
  const cc = document.getElementById('confetti-canvas');
  cc.style.display = 'block';
  cc.width = window.innerWidth; cc.height = window.innerHeight;
  const ctx = cc.getContext('2d');
  const pieces = Array.from({length: 80}, () => ({
    x: Math.random() * cc.width, y: -10 - Math.random() * 100,
    r: 4 + Math.random() * 5, d: 2 + Math.random() * 3,
    color: ['#7C5CFC','#C084FC','#F1C40F','#4ADE80','#60A5FA','#F87171'][Math.floor(Math.random()*6)],
    angle: Math.random() * 360, spin: (Math.random()-.5)*8, drift: (Math.random()-.5)*1.5,
  }));
  let frame = 0;
  (function tick() {
    ctx.clearRect(0,0,cc.width,cc.height);
    pieces.forEach(p => {
      p.y += p.d; p.x += p.drift; p.angle += p.spin;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.angle*Math.PI/180);
      ctx.fillStyle = p.color; ctx.globalAlpha = Math.max(0, 1-frame/90);
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.4); ctx.restore();
    });
    frame++;
    if (frame < 110) requestAnimationFrame(tick);
    else { ctx.clearRect(0,0,cc.width,cc.height); cc.style.display='none'; }
  })();
}

// ── Keywords (placeholder) ──
function handleKeyword() {
  const input = document.getElementById('keyword-input');
  const feedback = document.getElementById('keyword-feedback');
  feedback.textContent = '× Clave no reconocida';
  feedback.className = 'error';
  setTimeout(() => { feedback.textContent = ''; feedback.className = ''; }, 2500);
  input.value = '';
}

// ── Arranque ──
init().catch(console.error);
