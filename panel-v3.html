<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar OS — Admin v3</title>
  <style>
    :root {
      --bg:        #0A0A10;
      --surface:   #14141C;
      --surface2:  #1E1E2A;
      --surface3:  #252534;
      --border:    #2A2A3C;
      --accent:    #7C5CFC;
      --accent2:   #C084FC;
      --danger:    #E05252;
      --success:   #4ADE80;
      --warn:      #F1C40F;
      --text:      #EEEEF8;
      --text-muted:#7878A0;
      --radius:    8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .topbar h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar-sep { flex: 1; }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .dirty-indicator {
      font-size: 11px;
      color: var(--warn);
      display: none;
    }
    .dirty-indicator.visible { display: block; }

    /* ── Buttons ── */
    .btn {
      padding: 7px 14px;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
    .btn-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 7px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      transition: color .15s, background .15s;
    }
    .btn-icon:hover { color: var(--text); background: var(--surface3); }
    .btn-icon.danger:hover { color: var(--danger); }

    /* ── Layout ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left sidebar: layers ── */
    #sidebar-left {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    #layer-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    #layer-list::-webkit-scrollbar { width: 4px; }
    #layer-list::-webkit-scrollbar-thumb { background: var(--border); }
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .12s;
      border: 1px solid transparent;
    }
    .layer-item:hover { background: var(--surface2); }
    .layer-item.active { background: var(--surface2); border-color: var(--accent); }
    .layer-item-order {
      font-size: 10px;
      color: var(--text-muted);
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }
    .layer-item-name {
      flex: 1;
      font-weight: 600;
      font-size: 12px;
    }
    .layer-item-id {
      font-size: 10px;
      color: var(--text-muted);
      font-family: monospace;
    }
    .layer-item-count {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--surface3);
      padding: 2px 6px;
      border-radius: 10px;
    }

    /* ── Center: asset editor ── */
    #center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .center-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .center-header h2 { font-size: 14px; font-weight: 700; }
    .center-header .layer-meta { font-size: 11px; color: var(--text-muted); font-family: monospace; }
    #center-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    #center-content::-webkit-scrollbar { width: 4px; }
    #center-content::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Asset grid in center ── */
    .asset-admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .asset-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .15s;
    }
    .asset-card:hover { border-color: var(--accent); }
    .asset-card-preview {
      width: 100%;
      aspect-ratio: 1;
      background: var(--surface3);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .asset-card-preview canvas { width: 100%; height: 100%; display: block; }
    .asset-card-body { padding: 8px; }
    .asset-card-name { font-size: 11px; font-weight: 600; display: block; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .asset-card-id { font-size: 10px; color: var(--text-muted); font-family: monospace; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .asset-card-actions { display: flex; gap: 4px; padding: 6px 8px 8px; }

    /* ── Upload / dropzone ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .upload-area:hover, .upload-area.drag-over { border-color: var(--accent); background: rgba(124,92,252,.05); }
    .upload-area input { display: none; }

    /* ── Layer metadata editor ── */
    .meta-section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
    }
    .meta-section h3 { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
    .form-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .form-row label { font-size: 11px; color: var(--text-muted); width: 110px; flex-shrink: 0; }
    .form-row input, .form-row select {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 12px;
    }
    .form-row input:focus, .form-row select:focus { outline: 1px solid var(--accent); }
    .form-row input[type=checkbox] { width: auto; flex: none; }

    /* ── Right sidebar: preview ── */
    #sidebar-right {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #preview-area {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #preview-canvas-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: #111;
    }
    #preview-canvas { width: 100%; display: block; }
    .preview-controls { display: flex; gap: 8px; }
    .layer-toggle-list { display: flex; flex-direction: column; gap: 3px; max-height: 260px; overflow-y: auto; }
    .layer-toggle-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      background: var(--surface2);
      font-size: 11px;
      cursor: pointer;
      user-select: none;
    }
    .layer-toggle-item:hover { background: var(--surface3); }
    .layer-toggle-item input[type=checkbox] { cursor: pointer; }

    /* ── Color overrides editor ── */
    .color-override-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .color-swatch-small {
      width: 24px; height: 24px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,.15);
      flex-shrink: 0;
    }
    .color-override-row span { flex: 1; font-size: 11px; font-family: monospace; color: var(--text-muted); }

    /* ── Modals ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      width: 460px;
      max-width: 96vw;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-box h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* ── Toasts ── */
    .toast {
      position: fixed;
      bottom: 20px; right: 20px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      z-index: 200;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .toast-success { background: #1A3A28; color: var(--success); border: 1px solid var(--success); }
    .toast-error   { background: #3A1A1A; color: var(--danger);  border: 1px solid var(--danger); }
    .toast-info    { background: #1A1A3A; color: var(--text);    border: 1px solid var(--border); white-space: pre; max-width: 380px; font-size: 11px; line-height: 1.6; }

    /* ── Empty state ── */
    .empty-state {
      color: var(--text-muted);
      font-size: 12px;
      padding: 40px;
      text-align: center;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>AVATAR OS</h1>
  <span style="font-size:11px;color:var(--text-muted)">Admin v3</span>
  <div class="topbar-sep"></div>
  <span class="dirty-indicator" id="dirty-indicator">● cambios sin guardar</span>
  <div class="topbar-actions">
    <button class="btn btn-ghost btn-sm" id="btn-randomize">🎲 Aleatorio</button>
    <button class="btn btn-accent btn-sm" id="btn-batch-upload">📦 Carga por lote</button>
    <button class="btn btn-ghost btn-sm" id="btn-export-json">⬇ Exportar JSON</button>
    <a href="index.html" target="_blank" class="btn btn-ghost btn-sm">← Builder</a>
  </div>
</div>

<div class="workspace">
  <!-- Left: layer list -->
  <div id="sidebar-left">
    <div class="sidebar-header">
      Capas
      <button class="btn btn-accent btn-sm" id="btn-add-layer">+ Capa</button>
    </div>
    <div id="layer-list"></div>
  </div>

  <!-- Center: asset + layer editor -->
  <div id="center-panel">
    <div class="center-header" id="center-header">
      <span style="color:var(--text-muted);font-size:12px">← Selecciona una capa</span>
    </div>
    <div id="center-content">
      <div class="empty-state">Selecciona una capa para gestionar sus assets</div>
    </div>
  </div>

  <!-- Right: preview -->
  <div id="sidebar-right">
    <div class="sidebar-header">Preview</div>
    <div id="preview-area">
      <div id="preview-canvas-wrap">
        <canvas id="preview-canvas" width="600" height="600"></canvas>
      </div>
      <div class="preview-controls">
        <button class="btn btn-ghost btn-sm" style="flex:1" id="btn-preview-random">🎲</button>
        <button class="btn btn-ghost btn-sm" style="flex:1" id="btn-preview-refresh">↺</button>
      </div>
      <div class="section-label">Capas visibles</div>
      <div id="layer-toggle-list" class="layer-toggle-list"></div>
    </div>
  </div>
</div>

<!-- Scripts v3 -->
<script src="js/svg-processor.js?v=3"></script>
<script src="js/asset-loader.js?v=1"></script>
<script src="js/state.js?v=3"></script>
<script src="js/engine.js?v=3"></script>

<script>
// ── Admin v3 ────────────────────────────────────────────────────────────────

const LAYERS_KEY   = 'avatar-os-admin-layers-v3';
const REGISTRY_KEY = 'avatar-os-admin-registry-v3';

let _layers   = [];
let _registry = { assets: [] };
let _activeLayerId = null;
// dataURLs de archivos subidos en esta sesión (no se persisten)
const _sessionBlobs = new Map();  // assetId → objectURL
let _isDirty  = false;

// Preview state (lightweight, not persisted)
const _previewSel  = {};   // layerId → assetId
const _layerVis    = {};   // layerId → boolean

const previewCanvas = document.getElementById('preview-canvas');

// ── Init ──────────────────────────────────────────────────────────────────

async function init() {
  // Try localStorage first, then fetch files
  const savedLayers   = localStorage.getItem(LAYERS_KEY);
  const savedRegistry = localStorage.getItem(REGISTRY_KEY);

  if (savedLayers && savedRegistry) {
    _layers   = JSON.parse(savedLayers);
    _registry = JSON.parse(savedRegistry);
  } else {
    const [ld, rd] = await Promise.all([
      fetch('data/layer-config.json').then(r => r.json()),
      fetch('data/asset-registry.json').then(r => r.json()),
    ]);
    _layers   = ld.layers.sort((a, b) => a.order - b.order);
    _registry = rd;
  }

  _layers.forEach(l => { _layerVis[l.id] = true; });
  _randomizePreview();
  renderLayerList();
  buildLayerToggles();

  document.getElementById('btn-add-layer').onclick    = () => openLayerModal(null);
  document.getElementById('btn-randomize').onclick    = () => { _randomizePreview(); doPreviewRender(); };
  document.getElementById('btn-preview-random').onclick  = () => { _randomizePreview(); doPreviewRender(); };
  document.getElementById('btn-preview-refresh').onclick = doPreviewRender;
  document.getElementById('btn-export-json').onclick  = exportJSON;
  document.getElementById('btn-batch-upload').onclick = openBatchModal;
}

// ── Persistence ───────────────────────────────────────────────────────────

function _markDirty() {
  _isDirty = true;
  document.getElementById('dirty-indicator').classList.add('visible');
  _save();
}

function _save() {
  localStorage.setItem(LAYERS_KEY,   JSON.stringify(_layers));
  localStorage.setItem(REGISTRY_KEY, JSON.stringify(_registry));
}

function exportJSON() {
  const layerBlob = new Blob([JSON.stringify({ layers: _layers }, null, 2)], { type: 'application/json' });
  const regBlob   = new Blob([JSON.stringify(_registry, null, 2)], { type: 'application/json' });
  _download(layerBlob, 'layer-config.json');
  setTimeout(() => _download(regBlob, 'asset-registry.json'), 300);
  showToast('Descargando layer-config.json y asset-registry.json\nReemplaza los archivos en data/', 'info');
  _isDirty = false;
  document.getElementById('dirty-indicator').classList.remove('visible');
}

function _download(blob, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

// ── Layer list ────────────────────────────────────────────────────────────

function renderLayerList() {
  const list = document.getElementById('layer-list');
  list.innerHTML = '';
  [..._layers].sort((a, b) => a.order - b.order).forEach(layer => {
    const count = _registry.assets.filter(a => a.layerId === layer.id).length;
    const item = document.createElement('div');
    item.className = 'layer-item' + (layer.id === _activeLayerId ? ' active' : '');
    item.innerHTML = `
      <span class="layer-item-order">${layer.order}</span>
      <div style="flex:1;min-width:0">
        <div class="layer-item-name">${layer.label}</div>
        <div class="layer-item-id">${layer.id}</div>
      </div>
      <span class="layer-item-count">${count}</span>
    `;
    item.onclick = () => selectLayer(layer.id);
    list.appendChild(item);
  });
}

function selectLayer(layerId) {
  _activeLayerId = layerId;
  renderLayerList();
  renderCenter();
}

// ── Center panel ──────────────────────────────────────────────────────────

function renderCenter() {
  const layer = _layers.find(l => l.id === _activeLayerId);
  if (!layer) return;

  // Header
  const header = document.getElementById('center-header');
  header.innerHTML = `
    <div style="flex:1">
      <h2>${layer.label}</h2>
      <span class="layer-meta">${layer.id} · order ${layer.order} · ${layer.blendMode || 'source-over'}</span>
    </div>
    <button class="btn btn-ghost btn-sm" id="btn-edit-layer">Editar capa</button>
    <button class="btn btn-danger btn-sm" id="btn-delete-layer">Eliminar</button>
  `;
  header.querySelector('#btn-edit-layer').onclick   = () => openLayerModal(layer);
  header.querySelector('#btn-delete-layer').onclick = () => confirmDeleteLayer(layer);

  // Content
  const content = document.getElementById('center-content');
  content.innerHTML = '';

  // Layer metadata summary
  const meta = document.createElement('div');
  meta.className = 'meta-section';
  meta.innerHTML = `
    <h3>Metadatos de capa</h3>
    <div class="form-row"><label>colorToken</label><span style="font-family:monospace;font-size:12px">${layer.colorToken || '— ninguno —'}</span></div>
    <div class="form-row"><label>blendMode</label><span style="font-family:monospace;font-size:12px">${layer.blendMode || 'source-over'}</span></div>
    <div class="form-row"><label>type</label><span style="font-family:monospace;font-size:12px">${layer.type || 'svg'}</span></div>
    <div class="form-row"><label>optional</label><span style="font-size:12px">${layer.optional ? 'Sí' : 'No'}</span></div>
  `;
  content.appendChild(meta);

  // Assets section
  const assetLabel = document.createElement('div');
  assetLabel.className = 'section-label';
  assetLabel.textContent = 'Assets';
  content.appendChild(assetLabel);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-accent btn-sm';
  addBtn.style.marginBottom = '12px';
  addBtn.textContent = '+ Agregar asset';
  addBtn.onclick = () => openAssetModal(layer, null);
  content.appendChild(addBtn);

  const grid = document.createElement('div');
  grid.className = 'asset-admin-grid';
  const layerAssets = _registry.assets.filter(a => a.layerId === layer.id);
  layerAssets.forEach(asset => {
    grid.appendChild(_makeAssetCard(layer, asset));
  });
  content.appendChild(grid);

  // Upload area
  const uploadArea = document.createElement('label');
  uploadArea.className = 'upload-area';
  uploadArea.innerHTML = `
    Arrastra SVG/PNG aquí o haz clic para subir
    <input type="file" accept=".svg,.png,.jpg" multiple>
  `;
  const fileInput = uploadArea.querySelector('input');
  fileInput.onchange = e => _handleUpload(layer, e.target.files);
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('drag-over');
    _handleUpload(layer, e.dataTransfer.files);
  });
  content.appendChild(uploadArea);
}

function _makeAssetCard(layer, asset) {
  const card = document.createElement('div');
  card.className = 'asset-card';

  const preview = document.createElement('div');
  preview.className = 'asset-card-preview';

  if (!asset.src) {
    preview.innerHTML = '<span style="font-size:20px;color:#555">✕</span>';
  } else {
    const thumb = document.createElement('canvas');
    thumb.width = thumb.height = 120;
    preview.appendChild(thumb);
    _renderThumb(thumb, layer, asset);
  }

  card.innerHTML = `
    <div class="asset-card-body">
      <span class="asset-card-name" title="${asset.label}">${asset.label}</span>
      <span class="asset-card-id" title="${asset.id}">${asset.id}</span>
    </div>
    <div class="asset-card-actions"></div>
  `;
  card.insertBefore(preview, card.firstChild);

  const actions = card.querySelector('.asset-card-actions');

  const editBtn = document.createElement('button');
  editBtn.className = 'btn-icon';
  editBtn.title = 'Editar';
  editBtn.textContent = '✎';
  editBtn.onclick = () => openAssetModal(layer, asset);

  const previewBtn = document.createElement('button');
  previewBtn.className = 'btn-icon';
  previewBtn.title = 'Previsualizar';
  previewBtn.textContent = '▶';
  previewBtn.onclick = () => {
    _previewSel[layer.id] = asset.id;
    doPreviewRender();
  };

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-icon danger';
  delBtn.title = 'Eliminar';
  delBtn.textContent = '✕';
  delBtn.onclick = () => {
    if (!confirm(`¿Eliminar asset "${asset.label}"?`)) return;
    _registry.assets = _registry.assets.filter(a => a.id !== asset.id);
    _markDirty();
    renderCenter();
    renderLayerList();
  };

  actions.appendChild(editBtn);
  actions.appendChild(previewBtn);
  actions.appendChild(delBtn);
  return card;
}

async function _renderThumb(thumbCanvas, layer, asset) {
  const SIZE = 120;
  const sessionSrc = _sessionBlobs.get(asset.id);
  const isBitmap = /\.(png|jpg|jpeg|webp)$/i.test(asset.src || '');

  thumbCanvas.width = thumbCanvas.height = SIZE;
  const ctx = thumbCanvas.getContext('2d');

  try {
    if (sessionSrc && isBitmap) {
      // PNG/JPG subido en sesión — cargar imagen directamente sin engine
      const img = await new Promise((res, rej) => {
        const i = new Image();
        i.onload = () => res(i);
        i.onerror = rej;
        i.src = sessionSrc;
      });
      ctx.drawImage(img, 0, 0, SIZE, SIZE);
    } else {
      // SVG o placeholder — usar engine en canvas temporal
      const tmp = document.createElement('canvas');
      const effectiveAsset = sessionSrc ? { ...asset, src: sessionSrc } : asset;
      const fakeRegistry = { assets: [effectiveAsset] };
      const fakeState = {
        getTokens: () => ({ 'skin-color': '#F9C7B6', 'hair-color': '#00B181' }),
        getSelectedAssets: () => ({ [layer.id]: effectiveAsset.id }),
      };
      await Engine.render(tmp, [layer], fakeRegistry, fakeState);
      ctx.drawImage(tmp, 0, 0, SIZE, SIZE);
    }
  } catch(e) {
    ctx.fillStyle = '#1E1E2A';
    ctx.fillRect(0, 0, SIZE, SIZE);
    ctx.fillStyle = '#555';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(asset.label.slice(0, 14), SIZE/2, SIZE/2 + 4);
  }
}

// ── Upload handler ────────────────────────────────────────────────────────

async function _handleUpload(layer, files) {
  const copyPaths = [];
  for (const file of files) {
    const slug = file.name.replace(/\.[^.]+$/, '').replace(/\s+/g, '-').toLowerCase();
    const label = file.name.replace(/\.[^.]+$/, '');
    const assetId = `${slug}-${Date.now()}`;
    const relativeSrc = `assets/${layer.id}/${file.name}`;

    const existing = _registry.assets.find(a => a.src === relativeSrc);
    if (existing) continue;

    // Guardar blob URL en sesión para preview inmediato
    _sessionBlobs.set(assetId, URL.createObjectURL(file));

    _registry.assets.push({
      id: assetId,
      layerId: layer.id,
      label,
      src: relativeSrc,
      tags: [],
      colorOverrides: [],
    });
    copyPaths.push(`assets/${layer.id}/${file.name}`);
  }
  if (copyPaths.length) {
    _markDirty();
    renderCenter();
    renderLayerList();
    showToast('Copia los archivos al proyecto:\n' + copyPaths.map(p => '• ' + p).join('\n'), 'info', 8000);
  }
}

// ── Layer modal ───────────────────────────────────────────────────────────

function openLayerModal(layer) {
  const isNew = !layer;
  const data = layer || { id: '', label: '', order: _layers.length, type: 'svg', blendMode: 'source-over', colorToken: null, optional: false };

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const box = document.createElement('div');
  box.className = 'modal-box';
  box.innerHTML = `
    <h3>${isNew ? 'Nueva capa' : 'Editar capa'}</h3>
    <div class="form-row"><label>ID</label><input id="lm-id" value="${data.id}" ${!isNew ? 'readonly' : ''} placeholder="hair-back"></div>
    <div class="form-row"><label>Label</label><input id="lm-label" value="${data.label}" placeholder="Cabello atrás"></div>
    <div class="form-row"><label>Order</label><input id="lm-order" type="number" value="${data.order}" style="width:80px;flex:none"></div>
    <div class="form-row">
      <label>Type</label>
      <select id="lm-type">
        ${['svg','image'].map(t => `<option ${data.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <label>blendMode</label>
      <select id="lm-blend">
        ${['source-over','multiply','screen','overlay','darken','lighten','soft-light','hard-light','difference','exclusion']
          .map(m => `<option ${data.blendMode===m?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <label>colorToken</label>
      <select id="lm-token">
        <option value="">— ninguno —</option>
        ${['skin-color','hair-color'].map(t => `<option value="${t}" ${data.colorToken===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <label>Optional</label>
      <input type="checkbox" id="lm-optional" ${data.optional?'checked':''}>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm modal-close">Cancelar</button>
      <button class="btn btn-accent btn-sm" id="lm-save">Guardar</button>
    </div>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  box.querySelectorAll('.modal-close').forEach(b => b.onclick = close);
  overlay.onclick = e => { if (e.target === overlay) close(); };

  box.querySelector('#lm-save').onclick = () => {
    const id    = box.querySelector('#lm-id').value.trim();
    const label = box.querySelector('#lm-label').value.trim();
    if (!id || !label) { showToast('ID y Label son obligatorios', 'error'); return; }
    if (isNew && _layers.find(l => l.id === id)) { showToast('ID ya existe', 'error'); return; }

    const updated = {
      id, label,
      order:      parseInt(box.querySelector('#lm-order').value) || 0,
      type:       box.querySelector('#lm-type').value,
      blendMode:  box.querySelector('#lm-blend').value,
      colorToken: box.querySelector('#lm-token').value || null,
      optional:   box.querySelector('#lm-optional').checked,
    };

    if (isNew) {
      _layers.push(updated);
      _layerVis[id] = true;
    } else {
      const idx = _layers.findIndex(l => l.id === id);
      if (idx !== -1) _layers[idx] = updated;
    }
    _layers.sort((a, b) => a.order - b.order);
    _markDirty();
    renderLayerList();
    buildLayerToggles();
    if (_activeLayerId === id) renderCenter();
    close();
    showToast('Capa guardada', 'success');
  };
}

function confirmDeleteLayer(layer) {
  if (!confirm(`¿Eliminar capa "${layer.label}" y todos sus assets?`)) return;
  _layers = _layers.filter(l => l.id !== layer.id);
  _registry.assets = _registry.assets.filter(a => a.layerId !== layer.id);
  _activeLayerId = null;
  _markDirty();
  renderLayerList();
  buildLayerToggles();
  document.getElementById('center-header').innerHTML = '<span style="color:var(--text-muted);font-size:12px">← Selecciona una capa</span>';
  document.getElementById('center-content').innerHTML = '<div class="empty-state">Selecciona una capa para gestionar sus assets</div>';
}

// ── Asset modal ───────────────────────────────────────────────────────────

function openAssetModal(layer, asset) {
  const isNew = !asset;
  const data = asset || { id: '', label: '', src: '', tags: [], colorOverrides: [] };

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const box = document.createElement('div');
  box.className = 'modal-box';

  const overridesHtml = (data.colorOverrides || []).map((co, i) => `
    <div class="color-override-row" data-i="${i}">
      <div class="color-swatch-small" style="background:${co.original}"></div>
      <span>${co.original}</span>
      <span>→</span>
      <div class="color-swatch-small" style="background:${co.replacement}"></div>
      <span>${co.replacement}</span>
      <button class="btn-icon danger co-del" data-i="${i}" title="Quitar">✕</button>
    </div>
  `).join('');

  box.innerHTML = `
    <h3>${isNew ? 'Nuevo asset' : 'Editar asset'}</h3>
    <div class="form-row"><label>ID</label><input id="am-id" value="${data.id}" ${!isNew ? 'readonly' : ''} placeholder="hair-short-back"></div>
    <div class="form-row"><label>Label</label><input id="am-label" value="${data.label}" placeholder="Corto"></div>
    <div class="form-row"><label>Src (ruta)</label><input id="am-src" value="${data.src || ''}" placeholder="assets/${layer.id}/filename.svg"></div>
    <div class="form-row"><label>Tags (csv)</label><input id="am-tags" value="${(data.tags||[]).join(',')}" placeholder="base,natural"></div>
    <div class="section-label" style="margin-top:12px">Color overrides (recoloreo)</div>
    <div id="am-overrides">${overridesHtml}</div>
    <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
      <input id="am-from" placeholder="rgb(249,199,182)" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:var(--text);font-size:11px;font-family:monospace">
      <span style="color:var(--text-muted)">→</span>
      <input id="am-to" type="color" value="#7C5CFC" style="width:40px;height:30px;border:none;border-radius:6px;cursor:pointer;background:none">
      <button class="btn btn-ghost btn-sm" id="am-add-override">+ Override</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm modal-close">Cancelar</button>
      <button class="btn btn-accent btn-sm" id="am-save">Guardar</button>
    </div>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  box.querySelectorAll('.modal-close').forEach(b => b.onclick = close);
  overlay.onclick = e => { if (e.target === overlay) close(); };

  // Delete override
  box.querySelector('#am-overrides').addEventListener('click', e => {
    const delBtn = e.target.closest('.co-del');
    if (!delBtn) return;
    const i = parseInt(delBtn.dataset.i);
    data.colorOverrides.splice(i, 1);
    // Re-render overrides
    box.querySelector('#am-overrides').innerHTML = (data.colorOverrides || []).map((co, idx) => `
      <div class="color-override-row">
        <div class="color-swatch-small" style="background:${co.original}"></div>
        <span>${co.original}</span><span>→</span>
        <div class="color-swatch-small" style="background:${co.replacement}"></div>
        <span>${co.replacement}</span>
        <button class="btn-icon danger co-del" data-i="${idx}" title="Quitar">✕</button>
      </div>
    `).join('');
  });

  // Add override
  box.querySelector('#am-add-override').onclick = () => {
    const from = box.querySelector('#am-from').value.trim();
    const to   = box.querySelector('#am-to').value.trim();
    if (!from) { showToast('Indica el color original (rgb(...))', 'error'); return; }
    if (!data.colorOverrides) data.colorOverrides = [];
    data.colorOverrides.push({ original: from, replacement: to });
    const row = document.createElement('div');
    row.className = 'color-override-row';
    row.innerHTML = `
      <div class="color-swatch-small" style="background:${from}"></div>
      <span>${from}</span><span>→</span>
      <div class="color-swatch-small" style="background:${to}"></div>
      <span>${to}</span>
      <button class="btn-icon danger co-del" data-i="${data.colorOverrides.length-1}" title="Quitar">✕</button>
    `;
    box.querySelector('#am-overrides').appendChild(row);
    box.querySelector('#am-from').value = '';
  };

  // Save
  box.querySelector('#am-save').onclick = () => {
    const id    = box.querySelector('#am-id').value.trim();
    const label = box.querySelector('#am-label').value.trim();
    const src   = box.querySelector('#am-src').value.trim() || null;
    const tags  = box.querySelector('#am-tags').value.split(',').map(t => t.trim()).filter(Boolean);
    if (!id || !label) { showToast('ID y Label son obligatorios', 'error'); return; }
    if (isNew && _registry.assets.find(a => a.id === id)) { showToast('ID ya existe', 'error'); return; }

    const updated = { id, layerId: layer.id, label, src, tags, colorOverrides: data.colorOverrides || [] };

    if (isNew) {
      _registry.assets.push(updated);
    } else {
      const idx = _registry.assets.findIndex(a => a.id === id);
      if (idx !== -1) _registry.assets[idx] = updated;
    }

    _markDirty();
    renderCenter();
    renderLayerList();
    close();
    showToast('Asset guardado', 'success');
  };
}

// ── Preview ───────────────────────────────────────────────────────────────

function _randomizePreview() {
  _layers.forEach(layer => {
    const assets = _registry.assets.filter(a => a.layerId === layer.id);
    if (assets.length) {
      const pick = assets[Math.floor(Math.random() * assets.length)];
      _previewSel[layer.id] = pick.id;
    }
  });
}

async function doPreviewRender() {
  const visibleLayers = _layers.filter(l => _layerVis[l.id] !== false);

  // Enriquecer registry con blob URLs de sesión para assets recién subidos
  const enrichedRegistry = {
    assets: _registry.assets.map(a => {
      if (!_sessionBlobs.has(a.id)) return a;
      return { ...a, src: _sessionBlobs.get(a.id), _srcHint: a.src };
    }),
  };

  const fakeState = {
    getTokens: () => ({ 'skin-color': '#F9C7B6', 'hair-color': '#00B181' }),
    getSelectedAssets: () => ({ ..._previewSel }),
  };
  try {
    await Engine.render(previewCanvas, visibleLayers, enrichedRegistry, fakeState);
  } catch(e) {
    console.error('Preview render error', e);
  }
}

function buildLayerToggles() {
  const list = document.getElementById('layer-toggle-list');
  list.innerHTML = '';
  [..._layers].sort((a, b) => a.order - b.order).forEach(layer => {
    const item = document.createElement('label');
    item.className = 'layer-toggle-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = _layerVis[layer.id] !== false;
    cb.onchange = () => { _layerVis[layer.id] = cb.checked; doPreviewRender(); };
    item.appendChild(cb);
    item.appendChild(document.createTextNode(layer.label));
    list.appendChild(item);
  });
}

// ── Toast ─────────────────────────────────────────────────────────────────

function showToast(msg, type = 'info', duration = 4000) {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

// ── Batch upload ──────────────────────────────────────────────────────────

/**
 * Detecta el layerId a partir del nombre de archivo.
 * Estrategia: busca el prefijo más largo de _layers.id que sea prefijo del slug del archivo.
 * Ejemplo: "hair-back-long-waves.svg" → layerId "hair-back"
 */
function _detectLayer(filename) {
  const slug = filename.replace(/\.[^.]+$/, '').toLowerCase();
  // Ordenar por longitud desc para preferir match más específico
  const sorted = [..._layers].sort((a, b) => b.id.length - a.id.length);
  for (const l of sorted) {
    if (slug === l.id || slug.startsWith(l.id + '-') || slug.startsWith(l.id + '_')) {
      return l.id;
    }
  }
  return null;
}

function _slugToLabel(filename) {
  return filename
    .replace(/\.[^.]+$/, '')
    .replace(/[-_]/g, ' ')
    .replace(/\b\w/g, c => c.toUpperCase());
}

function openBatchModal() {
  // Items pendientes de importar: [{ file, layerId, label, src, duplicate }]
  let _items = [];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.style.alignItems = 'flex-start';
  overlay.style.paddingTop = '40px';

  const box = document.createElement('div');
  box.className = 'modal-box';
  box.style.width = '720px';
  box.style.maxHeight = '80vh';
  box.style.display = 'flex';
  box.style.flexDirection = 'column';
  box.style.gap = '12px';

  box.innerHTML = `
    <h3>📦 Carga por lote</h3>
    <p style="font-size:11px;color:var(--text-muted);line-height:1.5">
      Arrastra o selecciona múltiples SVG/PNG. El sistema detecta la capa automáticamente por el nombre del archivo.<br>
      <strong>Convención:</strong> <code style="background:var(--surface3);padding:2px 5px;border-radius:4px">{layerId}-{variante}.svg</code>
      — ej: <code style="background:var(--surface3);padding:2px 5px;border-radius:4px">hair-back-ondulado.svg</code>
    </p>
    <label id="batch-drop" style="
      border:2px dashed var(--border);border-radius:var(--radius);padding:24px;
      text-align:center;cursor:pointer;color:var(--text-muted);font-size:12px;
      transition:border-color .15s,background .15s;display:block;
    ">
      Arrastra archivos aquí o haz clic para seleccionar
      <input type="file" accept=".svg,.png,.jpg" multiple style="display:none">
    </label>
    <div id="batch-table-wrap" style="flex:1;overflow-y:auto;min-height:0"></div>
    <div id="batch-summary" style="font-size:11px;color:var(--text-muted)"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm modal-close">Cancelar</button>
      <button class="btn btn-accent btn-sm" id="batch-confirm" disabled>Importar todo</button>
    </div>
  `;

  overlay.appendChild(box);
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  box.querySelectorAll('.modal-close').forEach(b => b.onclick = close);
  overlay.onclick = e => { if (e.target === overlay) close(); };

  const dropZone = box.querySelector('#batch-drop');
  const fileInput = dropZone.querySelector('input');
  const tableWrap = box.querySelector('#batch-table-wrap');
  const summary   = box.querySelector('#batch-summary');
  const confirmBtn= box.querySelector('#batch-confirm');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; dropZone.style.background = 'rgba(124,92,252,.05)'; });
  dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; dropZone.style.background = ''; });
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.style.borderColor = ''; dropZone.style.background = '';
    processFiles(e.dataTransfer.files);
  });
  fileInput.onchange = e => processFiles(e.target.files);

  function processFiles(files) {
    _items = [];
    for (const file of files) {
      const detectedLayerId = _detectLayer(file.name);
      const slug = file.name.replace(/\.[^.]+$/, '').replace(/\s+/g, '-').toLowerCase();
      const assetId = slug;
      const src = detectedLayerId ? `assets/${detectedLayerId}/${file.name}` : `assets/unknown/${file.name}`;
      const duplicate = _registry.assets.some(a => a.id === assetId || a.src === src);
      _items.push({ file, layerId: detectedLayerId || '', label: _slugToLabel(file.name), assetId, src, duplicate });
    }
    renderTable();
  }

  function renderTable() {
    if (!_items.length) { tableWrap.innerHTML = ''; confirmBtn.disabled = true; return; }

    const validCount = _items.filter(i => i.layerId && !i.duplicate).length;
    const warnCount  = _items.filter(i => !i.layerId).length;
    const dupCount   = _items.filter(i => i.duplicate).length;
    summary.textContent = `${_items.length} archivos · ${validCount} importables · ${warnCount} sin capa detectada · ${dupCount} duplicados`;
    confirmBtn.disabled = validCount === 0;

    const table = document.createElement('table');
    table.style.cssText = 'width:100%;border-collapse:collapse;font-size:11px';
    table.innerHTML = `
      <thead>
        <tr style="color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border)">
          <th style="padding:6px 8px">Archivo</th>
          <th style="padding:6px 8px">Capa detectada</th>
          <th style="padding:6px 8px">Label</th>
          <th style="padding:6px 8px">Estado</th>
        </tr>
      </thead>
    `;
    const tbody = document.createElement('tbody');

    _items.forEach((item, idx) => {
      const tr = document.createElement('tr');
      tr.style.borderBottom = '1px solid rgba(255,255,255,.04)';
      const statusColor = item.duplicate ? 'var(--warn)' : item.layerId ? 'var(--success)' : 'var(--danger)';
      const statusText  = item.duplicate ? '⚠ Duplicado' : item.layerId ? '✓ Listo' : '✕ Sin capa';

      tr.innerHTML = `
        <td style="padding:5px 8px;color:var(--text-muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${item.file.name}">${item.file.name}</td>
        <td style="padding:5px 8px"></td>
        <td style="padding:5px 8px"></td>
        <td style="padding:5px 8px;color:${statusColor};font-weight:600">${statusText}</td>
      `;

      // Layer select
      const layerSelect = document.createElement('select');
      layerSelect.style.cssText = 'background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 6px;color:var(--text);font-size:11px;width:100%';
      const noneOpt = document.createElement('option');
      noneOpt.value = ''; noneOpt.textContent = '— seleccionar —';
      layerSelect.appendChild(noneOpt);
      _layers.forEach(l => {
        const opt = document.createElement('option');
        opt.value = l.id; opt.textContent = `${l.id}`;
        if (l.id === item.layerId) opt.selected = true;
        layerSelect.appendChild(opt);
      });
      layerSelect.onchange = () => {
        _items[idx].layerId = layerSelect.value;
        _items[idx].src = layerSelect.value ? `assets/${layerSelect.value}/${item.file.name}` : '';
        _items[idx].duplicate = _registry.assets.some(a => a.src === _items[idx].src);
        renderTable();
      };
      tr.children[1].appendChild(layerSelect);

      // Label input
      const labelInput = document.createElement('input');
      labelInput.value = item.label;
      labelInput.style.cssText = 'background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 6px;color:var(--text);font-size:11px;width:100%';
      labelInput.oninput = () => { _items[idx].label = labelInput.value; };
      tr.children[2].appendChild(labelInput);

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    tableWrap.innerHTML = '';
    tableWrap.appendChild(table);
  }

  confirmBtn.onclick = () => {
    const toImport = _items.filter(i => i.layerId && !i.duplicate);
    const copyPaths = [];

    toImport.forEach(item => {
      // Blob URL para preview inmediato en esta sesión
      _sessionBlobs.set(item.assetId, URL.createObjectURL(item.file));

      _registry.assets.push({
        id: item.assetId,
        layerId: item.layerId,
        label: item.label,
        src: item.src,
        tags: [],
        colorOverrides: [],
      });
      copyPaths.push(item.src);
    });

    if (toImport.length) {
      _markDirty();
      renderLayerList();
      if (_activeLayerId) renderCenter();
      showToast(`${toImport.length} assets importados.\nCopia los archivos:\n` + copyPaths.map(p => '• ' + p).join('\n'), 'info', 10000);
    }
    close();
  };
}

// ── Boot ──────────────────────────────────────────────────────────────────

init().catch(console.error);
</script>
